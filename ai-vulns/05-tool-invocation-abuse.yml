# Intentional: Tool invocation abuse in CI/CD workflows.
#
# These workflows demonstrate patterns where AI/LLM output directly
# controls tool execution — shell commands, API calls, infrastructure
# changes — without validation or sandboxing.
#
# Scanner should flag: model output used in run: steps, unsanitized
# AI output controlling infrastructure, no output validation.

name: AI-Powered Auto-Fix

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai-auto-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate fix with AI
        id: ai-fix
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Send issue body to LLM, ask for a shell command to fix it
          ISSUE_BODY='${{ github.event.issue.body }}'
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4\",
              \"messages\": [{
                \"role\": \"user\",
                \"content\": \"Generate a bash command to fix this issue: $ISSUE_BODY\"
              }]
            }" | jq -r '.choices[0].message.content')
          echo "command=$RESPONSE" >> $GITHUB_OUTPUT

      # Intentional: AI output is executed as a shell command with no
      # validation, sandboxing, or allowlisting. An attacker who controls
      # the issue body controls what command runs.
      - name: Apply AI-generated fix
        run: |
          ${{ steps.ai-fix.outputs.command }}

      - name: Commit and push
        run: |
          git add -A
          git commit -m "fix: AI-generated fix for #${{ github.event.issue.number }}"
          git push

---
# Intentional: Second workflow — AI controls Terraform/infrastructure
name: AI Infrastructure Assistant

on:
  issue_comment:
    types: [created]

jobs:
  infra-ai:
    if: contains(github.event.comment.body, '/ai-infra')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse infrastructure request
        id: ai-infra
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          COMMENT='${{ github.event.comment.body }}'
          # Intentional: comment body (attacker-controlled) sent to AI,
          # response used to generate Terraform config
          TERRAFORM_CONFIG=$(curl -s https://api.anthropic.com/v1/messages \
            -H "x-api-key: $ANTHROPIC_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"claude-sonnet-4-20250514\",
              \"max_tokens\": 4096,
              \"messages\": [{
                \"role\": \"user\",
                \"content\": \"Generate Terraform HCL for: $COMMENT\"
              }]
            }" | jq -r '.content[0].text')
          echo "$TERRAFORM_CONFIG" > infra/generated.tf

      # Intentional: AI-generated Terraform is applied without review.
      # Attacker can provision resources, modify IAM, exfiltrate state.
      - name: Apply infrastructure changes
        run: |
          cd infra
          terraform init
          terraform apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
