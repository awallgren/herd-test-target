# Intentional: AI integrated directly into CI/CD pipeline.
#
# This workflow consumes model output as shell commands, modifies
# deployment configs based on AI suggestions, and auto-applies
# changes without human review or sandboxing.
#
# Scanner should flag: AI output in run: steps, no validation layer,
# secrets exposed to AI-controlled steps, auto-deploy from AI output.

name: AI-Powered CI/CD Pipeline

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  deployments: write
  id-token: write

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  ai-test-generation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Detect changed files
        id: changes
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Generate tests with AI
        id: gen-tests
        run: |
          # Intentional: sends source code to external AI API
          # exposing proprietary code and potentially secrets in source
          for f in ${{ steps.changes.outputs.files }}; do
            CONTENT=$(cat "$f" 2>/dev/null || true)
            TEST_CODE=$(curl -s https://api.openai.com/v1/chat/completions \
              -H "Authorization: Bearer $OPENAI_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{
                \"model\": \"gpt-4\",
                \"messages\": [{
                  \"role\": \"user\",
                  \"content\": \"Write unit tests for this code:\\n$CONTENT\"
                }]
              }" | jq -r '.choices[0].message.content')
            # Intentional: AI-generated test code is written to disk
            # and executed without review — could contain malicious code
            echo "$TEST_CODE" > "test_ai_${f##*/}"
          done

      # Intentional: executing AI-generated code in CI with access to
      # all repo secrets and GITHUB_TOKEN
      - name: Run AI-generated tests
        run: |
          pip install pytest
          pytest test_ai_*.py -v

  ai-security-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: AI security scan
        id: security
        run: |
          # Intentional: entire codebase including secrets sent to AI
          SCAN_RESULT=$(find . -name '*.py' -o -name '*.js' | head -20 | while read f; do
            cat "$f"
          done | curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4\",
              \"messages\": [{
                \"role\": \"user\",
                \"content\": \"Review for security issues and output PASS or FAIL: $(cat)\"
              }]
            }" | jq -r '.choices[0].message.content')
          echo "result=$SCAN_RESULT" >> $GITHUB_OUTPUT

      # Intentional: deployment decision based on AI text output
      # with no structured validation — "PASS" anywhere in the response
      # is enough to proceed with deployment
      - name: Gate deployment on AI review
        if: contains(steps.security.outputs.result, 'PASS')
        run: echo "Security review passed — proceeding to deploy"

  ai-deploy:
    needs: [ai-test-generation, ai-security-review]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate deployment config
        id: deploy-config
        run: |
          # Intentional: AI generates Kubernetes deployment manifests
          # that are applied directly to production
          DEPLOY_YAML=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4\",
              \"messages\": [{
                \"role\": \"user\",
                \"content\": \"Generate a Kubernetes deployment YAML for this app with 3 replicas\"
              }]
            }" | jq -r '.choices[0].message.content')
          echo "$DEPLOY_YAML" > k8s-deploy.yaml

      # Intentional: AI-generated k8s manifest applied directly to
      # production cluster with no review, diff, or approval gate
      - name: Deploy to production
        run: |
          kubectl apply -f k8s-deploy.yaml
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
