# Intentional: Supply chain intersection — AI agent + CI write permissions
# + untrusted PR content.
#
# This is the highest-risk configuration: an AI agent that processes
# untrusted PR content, has write access to the repository, and runs
# in CI with access to secrets. A single prompt injection in a PR can
# lead to full repository compromise, secret exfiltration, and
# supply chain poisoning.
#
# Scanner should flag: pull_request_target + write perms + AI processing
# of untrusted content + auto-commit + secret access

name: AI PR Assistant (Full Auto)

on:
  # Intentional: pull_request_target gives write access to base repo
  # while processing potentially malicious PR content
  pull_request_target:
    types: [opened, synchronize, edited]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write
  packages: write
  id-token: write

jobs:
  ai-review-and-fix:
    runs-on: ubuntu-latest
    # Intentional: runs on ALL PRs including from forks,
    # which means untrusted code from anyone
    if: github.event_name == 'pull_request_target' || contains(github.event.comment.body, '/ai-fix')
    steps:
      - name: Checkout base
        uses: actions/checkout@v6

      # Intentional: checks out the untrusted PR head into the
      # privileged workflow context
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-code

      - name: Collect PR context
        id: context
        run: |
          # Intentional: ALL of these are attacker-controlled in a fork PR
          PR_TITLE='${{ github.event.pull_request.title }}'
          PR_BODY='${{ github.event.pull_request.body }}'
          PR_DIFF=$(cd pr-code && git diff HEAD~1 2>/dev/null || git show HEAD)
          COMMENT='${{ github.event.comment.body }}'

          # Intentional: concatenating all untrusted input for the AI
          FULL_CONTEXT="PR Title: $PR_TITLE
          PR Description: $PR_BODY
          Comment: $COMMENT
          Diff:
          $PR_DIFF"
          echo "prompt<<CTXEOF" >> $GITHUB_OUTPUT
          echo "$FULL_CONTEXT" >> $GITHUB_OUTPUT
          echo "CTXEOF" >> $GITHUB_OUTPUT

      - name: AI Analysis and Auto-Fix
        id: ai-action
        env:
          # Intentional: multiple API keys available in the AI step
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          # Intentional: AI processes attacker-controlled content with
          # access to all repository secrets in the environment
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4\",
              \"messages\": [
                {\"role\": \"system\", \"content\": \"You are a code review bot. Analyze the PR and suggest fixes. Output a JSON object with keys: review, commands (array of shell commands to fix issues), files (array of {path, content} to create/modify).\"},
                {\"role\": \"user\", \"content\": $(echo '${{ steps.context.outputs.prompt }}' | jq -Rs .)}
              ]
            }")

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')
          echo "review=$REVIEW" >> $GITHUB_OUTPUT

          # Intentional: Parse AI output and execute suggested commands
          # An attacker can inject commands via the PR body/title/diff
          echo "$REVIEW" | jq -r '.commands[]?' 2>/dev/null | while read cmd; do
            echo "Executing AI-suggested fix: $cmd"
            eval "$cmd"
          done

          # Intentional: Write AI-suggested file changes to disk
          echo "$REVIEW" | jq -c '.files[]?' 2>/dev/null | while read file_json; do
            FILE_PATH=$(echo "$file_json" | jq -r '.path')
            FILE_CONTENT=$(echo "$file_json" | jq -r '.content')
            mkdir -p "$(dirname "$FILE_PATH")"
            echo "$FILE_CONTENT" > "$FILE_PATH"
          done

      # Intentional: auto-commit and push AI-generated changes with
      # write access. Attacker controls what gets committed.
      - name: Commit AI fixes
        run: |
          git config user.name "AI Assistant Bot"
          git config user.email "ai-bot@example.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix: AI-generated improvements"
          git push

      # Intentional: auto-approve the PR after AI review
      - name: Auto-approve if AI says it's clean
        if: contains(steps.ai-action.outputs.review, '"approved"')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve \
            --body "AI review: All checks passed. Auto-approved."

      # Intentional: publish a package release based on AI recommendation
      - name: Auto-release if AI suggests
        if: contains(steps.ai-action.outputs.review, '"release"')
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > .npmrc
          npm version patch
          npm publish
