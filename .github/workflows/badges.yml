name: Update Security Badges

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  security-events: read

jobs:
  update-badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Query alert counts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p badges

          # Dependabot alerts
          DB_OPEN=$(gh api repos/${{ github.repository }}/dependabot/alerts \
            --jq '[.[] | select(.state=="open")] | length' 2>/dev/null || echo "?")
          DB_FIXED=$(gh api repos/${{ github.repository }}/dependabot/alerts \
            --jq '[.[] | select(.state=="fixed")] | length' 2>/dev/null || echo "?")

          if [[ "$DB_OPEN" == "0" ]]; then
            DB_COLOR="brightgreen"
            DB_MSG="0 open"
          elif [[ "$DB_OPEN" =~ ^[0-9]+$ ]]; then
            DB_COLOR="red"
            DB_MSG="${DB_OPEN} open"
          else
            DB_COLOR="lightgrey"
            DB_MSG="unknown"
          fi

          cat > badges/dependabot.json <<EOF
          {
            "schemaVersion": 1,
            "label": "dependabot",
            "message": "${DB_MSG}",
            "color": "${DB_COLOR}",
            "namedLogo": "dependabot"
          }
          EOF

          # Code scanning alerts
          CS_OPEN=$(gh api repos/${{ github.repository }}/code-scanning/alerts \
            --jq '[.[] | select(.state=="open")] | length' 2>/dev/null || echo "?")

          if [[ "$CS_OPEN" == "0" ]]; then
            CS_COLOR="brightgreen"
            CS_MSG="0 open"
          elif [[ "$CS_OPEN" =~ ^[0-9]+$ ]]; then
            CS_COLOR="red"
            CS_MSG="${CS_OPEN} open"
          else
            CS_COLOR="lightgrey"
            CS_MSG="unknown"
          fi

          cat > badges/code-scanning.json <<EOF
          {
            "schemaVersion": 1,
            "label": "code scanning",
            "message": "${CS_MSG}",
            "color": "${CS_COLOR}",
            "namedLogo": "github"
          }
          EOF

          echo "Dependabot: ${DB_MSG} | Code scanning: ${CS_MSG}"

      - name: Commit badge data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/
          if git diff --cached --quiet; then
            echo "No badge changes"
          else
            git commit -m "badges: update security alert counts [skip ci]"
            git push
          fi
