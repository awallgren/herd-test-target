# Intentional: Tool invocation abuse in CI/CD workflows.
#
# This workflow demonstrates a pattern where AI/LLM output directly
# controls shell command execution — without validation or sandboxing.
#
# Scanner should flag: model output used in run: steps, unsanitized
# AI output controlling execution, no output validation.

name: AI-Powered Auto-Fix

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai-auto-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate fix with AI
        id: ai-fix
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Send issue body to LLM, ask for a shell command to fix it
          ISSUE_BODY='${{ github.event.issue.body }}'
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4\",
              \"messages\": [{
                \"role\": \"user\",
                \"content\": \"Generate a bash command to fix this issue: $ISSUE_BODY\"
              }]
            }" | jq -r '.choices[0].message.content')
          echo "command=$RESPONSE" >> $GITHUB_OUTPUT

      # Intentional: AI output is executed as a shell command with no
      # validation, sandboxing, or allowlisting. An attacker who controls
      # the issue body controls what command runs.
      - name: Apply AI-generated fix
        run: |
          ${{ steps.ai-fix.outputs.command }}

      - name: Commit and push
        run: |
          git add -A
          git commit -m "fix: AI-generated fix for #${{ github.event.issue.number }}"
          git push
