# Intentional: GitHub Actions workflow that gives an AI bot write access
# to the repository and runs on untrusted PR events.
# The bot reads PR body/diff (attacker-controlled) and can execute actions
# with elevated privileges.
# Scanner should flag: pull_request_target with write permissions, checkout of PR head

name: AI Code Review Bot
on:
  # Intentional: pull_request_target runs in the context of the BASE branch
  # with write access to the repo, but checks out attacker-controlled PR code
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          # Intentional: checking out the PR head ref in a pull_request_target
          # workflow means untrusted code runs with base branch permissions
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Read PR description for context
        id: pr-context
        run: |
          # Intentional: PR body is attacker-controlled input being piped
          # directly into the AI tool without sanitization
          PR_BODY='${{ github.event.pull_request.body }}'
          echo "context=$PR_BODY" >> $GITHUB_OUTPUT

      - name: AI Review
        env:
          # Intentional: GITHUB_TOKEN with write permissions passed to
          # a step that processes untrusted PR content
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Intentional: PR body (attacker-controlled) is sent directly to
          # the AI API without sanitization, and the response is executed
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4\",
              \"messages\": [{
                \"role\": \"user\",
                \"content\": \"Review this PR and suggest fixes: ${{ steps.pr-context.outputs.context }}\"
              }]
            }" | jq -r '.choices[0].message.content')
          echo "$RESPONSE"
          # Intentional: AI output is evaluated directly — allows arbitrary
          # command execution with write access to the repository
          eval "$RESPONSE"
